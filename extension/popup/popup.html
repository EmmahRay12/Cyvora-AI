<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Cyvora AI</title>

    <link rel="stylesheet"
          href="popup.css">

</head>

<body>

<div class="container">

    <h1>🛡️ Cyvora AI</h1>

    <p class="status">
        Protection Active
    </p>

    <hr>

    <h3>Current Website</h3>

    <p id="website">
        Not Scanned
    </p>

    <div class="score-box">

        <h2 id="risk">

            Waiting...

        </h2>

    </div>

    <div class="info">

        <p>
            <strong>Protocol:</strong>
            <span id="protocol">-</span>
        </p>

        <p>
            <strong>Domain:</strong>
            <span id="domain">-</span>
        </p>

        <p>
            <strong>AI Confidence:</strong>
            <span id="confidence">95%</span>
        </p>
<p>
    <strong>Website Reputation:</strong>
    <span id="reputation">Checking...</span>
</p>
<hr>

<h3>Threat Intelligence</h3>

<p><strong>Threat Score</strong></p>
<p id="threatScore">0%</p>

<p><strong>Risk Category</strong></p>
<p id="riskCategory">Low</p>

<p><strong>AI Confidence</strong></p>
<p id="confidence">95%</p>

<p><strong>Last Scan</strong></p>
<p id="lastScan">-</p>

<hr>
    </div>

    <hr>

    <h3>Security Report</h3>

    <ul id="report">

    </ul>

    <hr>

    <h3>Trackers Detected</h3>

    <ul id="trackers">

        <li>No Scan Yet</li>

    </ul>

    <button id="scanBtn">

        Scan Current Website

    </button>

</div>

<script type="module" src="popup.js"></script>

</body>

</html>
